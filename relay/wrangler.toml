name = "permit-payment-relay"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[durable_objects]
bindings = [
  { name = "RELAY_SESSION", class_name = "RelaySession" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RelaySession"]

[vars]
ALLOWED_ORIGIN = "http://localhost:5173"

# 本番環境では wrangler deploy --var ALLOWED_ORIGIN:https://your-domain.pages.dev
